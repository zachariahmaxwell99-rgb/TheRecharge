<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Directions | The Recharge Conference</title>
    <meta name="description" content="Get driving directions to the Recharge Conference at Camp Drew, Lennox Head NSW — enter your starting town for a Google Maps route.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Driving to Recharge 2026">
    <meta property="og:description" content="Road trip directions to Camp Drew, Lennox Head NSW.">
    <meta property="og:image" content="images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="style.css?v=20260718">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="page-dark" style="--page-bg: url('images/drone-drive-bg.jpg')">

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html">
                <img src="images/logo.png" alt="Recharge Logo" class="nav-logo">
            </a>
        </div>
        <div class="nav-right">
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main style="padding: 4rem 1rem; text-align: center;">
        <section class="content-section">
            <div class="glass-panel container">
                <h1>THE ROAD TRIP</h1>
                <p>Enter your starting town to get GPS directions directly to the conference at Camp Drew.</p>
                
                <input type="text" id="drive-town" placeholder="Your starting town (e.g. Byron Bay)...">
                <button class="btn btn-primary" onclick="openDriveMaps()">OPEN GOOGLE MAPS</button>
                
                <br>
                <a href="travel.html" class="back-btn">Back to travel options</a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 The Recharge Conference</p>
    </footer>

    <script>
        function openDriveMaps() {
            const town = document.getElementById('drive-town').value.trim();
            if (!town) return alert("Please enter a town name.");
            
            // Destination is set to Camp Drew, Lennox Head NSW
            const destination = "Camp+Drew+Lennox+Head+NSW";
            const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${destination}&origin=${encodeURIComponent(town)}&travelmode=driving`;
            
            window.open(mapsUrl, '_blank');
        }
    </script>
</body>
</html>
