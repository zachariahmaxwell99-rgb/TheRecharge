<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Recharge Conference | July 31 – August 2, 2026 | Lennox Head NSW</title>
    <meta name="description" content="The Recharge is a weekend conference equipping young Australian Christians for public life — politics, culture and the arts. July 31 – August 2, 2026 at Camp Drew, Lennox Head NSW.">
    <!-- Social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zachariahmaxwell99-rgb.github.io/TheRecharge/">
    <meta property="og:title" content="The Recharge Conference 2026">
    <meta property="og:description" content="A weekend of equipping and fellowship. July 31 – August 2, 2026 · Camp Drew, Lennox Head NSW.">
    <meta property="og:image" content="https://zachariahmaxwell99-rgb.github.io/TheRecharge/images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="style.css?v=20260718b">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Compact Header: slides in once the hero is scrolled past -->
    <header id="compact-header">
        <a href="index.html" class="compact-logo-link">
            <img src="images/logo-light.png" alt="Recharge Logo" class="compact-logo">
        </a>
        <div class="compact-countdown" aria-label="Countdown Timer">
            <div class="cd-unit"><span class="cd-days">00</span><p>Days</p></div>
            <div class="cd-unit cd-hours-box"><span class="cd-hours">00</span><p>Hours</p></div>
            <div class="cd-unit cd-minutes-box"><span class="cd-minutes">00</span><p>Min</p></div>
        </div>
        <div class="compact-actions">
            <nav class="compact-nav-links">
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <a href="https://humanitix.com" target="_blank" rel="noopener noreferrer" class="btn btn-primary">Book Tickets</a>
        </div>
    </header>

    <!-- Main Content -->
    <main>

        <!-- Full-screen Hero (scrolls naturally with the page) -->
        <section class="hero hero-home" id="home-hero" style="background: none;">

            <!-- JS-Driven Crossfade Slideshow: two layers swap back and forth -->
            <div id="slide-a" style="position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;z-index:-1;transition:opacity 1.5s ease;"></div>
            <div id="slide-b" style="position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;z-index:-2;transition:opacity 1.5s ease;"></div>

            <div class="hero-content">
                <!-- Navigation links integrated into hero -->
                <div class="hero-nav">
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                </div>

                <img src="images/logo-light.png" alt="Recharge Logo" class="hero-logo">

                <p class="blurb">A weekend of equipping and fellowship.</p>

                <h2 class="event-date">July 31st – August 2nd, 2026</h2>
                <div class="location-details">
                    <p class="event-location">Camp Drew, Lennox Head NSW</p>
                </div>

                <!-- Full Hero Buttons (Centered, above the countdown so they're never below the fold) -->
                <div class="hero-cta">
                     <a href="https://humanitix.com" target="_blank" rel="noopener noreferrer" class="btn btn-primary">Book Tickets</a>
                     <a href="travel.html" class="btn btn-primary">Travel Help</a>
                </div>

                <!-- Countdown Timer Container -->
                <section id="countdown" class="timer-grid" aria-label="Countdown Timer">
                    <div class="time-box">
                        <span class="cd-days">00</span>
                        <p>Days</p>
                    </div>
                    <div class="time-box">
                        <span class="cd-hours">00</span>
                        <p>Hours</p>
                    </div>
                    <div class="time-box">
                        <span class="cd-minutes">00</span>
                        <p>Minutes</p>
                    </div>
                    <div class="time-box">
                        <span class="cd-seconds">00</span>
                        <p>Seconds</p>
                    </div>
                </section>
            </div>
        </section>

        <!-- Dynamic Photo Gallery -->
        <section class="content-section" style="padding: 60px 20px; max-width: 1200px; margin: 0 auto; text-align: center;">
            <h2 style="font-size: 2.2rem;">GLIMPSES OF RECHARGE</h2>
            <div class="accent-line"></div>

            <div class="masonry-grid">
                <img src="images/masonry-iphone-2.jpg" alt="Community Interaction" class="masonry-img" loading="lazy">
                <img src="images/masonry-iphone-5.jpg" alt="Conference Highlight" class="masonry-img" loading="lazy">
                <img src="images/masonry-iphone-3.jpg" alt="Main Event" class="masonry-img" loading="lazy">
                <img src="images/masonry-iphone-4.jpg" alt="Attendee Experience" class="masonry-img" loading="lazy">
                <img src="images/masonry-iphone-1.jpg" alt="Recharge Atmosphere" class="masonry-img" loading="lazy">
                <img src="images/event-outdoor-gathering.jpg" alt="Event Presentation" class="masonry-img" loading="lazy">
                <img src="images/slide4-speaker-stage.jpg" alt="Crowd Reaction" class="masonry-img" loading="lazy">
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 The Recharge Conference</p>
    </footer>

    <!-- Compact Header Reveal Script -->
    <script>
        (function() {
            const hero = document.getElementById('home-hero');
            const compact = document.getElementById('compact-header');

            function updateHeader() {
                // Reveal once most of the hero has scrolled out of view
                const threshold = hero.offsetHeight - 120;
                compact.classList.toggle('visible', window.scrollY > threshold);
            }

            window.addEventListener('scroll', updateHeader, { passive: true });
            window.addEventListener('resize', updateHeader);
            updateHeader();
        })();
    </script>

    <!-- Hero Slideshow Script -->
    <script>
        (function() {
            const slides = [
                "images/drone-backup-pano-1.jpg",
                "images/event-crowd-1.jpg",
                "images/speaker-john.jpg"
            ];
            const overlay = "linear-gradient(rgba(10,20,30,0.65), rgba(10,20,30,0.65)), ";
            let current = 0;
            let useA = true;

            const a = document.getElementById('slide-a');
            const b = document.getElementById('slide-b');

            // Show first slide immediately
            a.style.backgroundImage = overlay + "url('" + slides[0] + "')";
            a.style.opacity = "1";
            b.style.opacity = "0";

            setInterval(function() {
                current = (current + 1) % slides.length;
                const next = overlay + "url('" + slides[current] + "')";

                if (useA) {
                    // b is behind (-z-index 2), load next into b, then fade a out
                    b.style.backgroundImage = next;
                    a.style.opacity = "0";
                    b.style.zIndex = "-1";
                    a.style.zIndex = "-2";
                    b.style.opacity = "1";
                } else {
                    // a is behind, load next into a, then fade b out
                    a.style.backgroundImage = next;
                    b.style.opacity = "0";
                    a.style.zIndex = "-1";
                    b.style.zIndex = "-2";
                    a.style.opacity = "1";
                }
                useA = !useA;
            }, 6000);
        })();
    </script>

    <!-- Countdown Script (feeds both the hero countdown and the compact header) -->
    <script>
        (function() {
            const countDownDate = new Date("July 31, 2026 17:00:00").getTime();
            let timer;

            function setUnit(unit, value) {
                document.querySelectorAll('.cd-' + unit).forEach(function(el) {
                    el.innerText = value.toString().padStart(2, '0');
                });
            }

            function updateTimer() {
                const now = new Date().getTime();
                const distance = countDownDate - now;

                if (distance < 0) {
                    if (timer) clearInterval(timer);
                    const countdownEl = document.getElementById("countdown");
                    if (countdownEl) countdownEl.innerHTML = "<p>THE EVENT HAS BEGUN</p>";
                    return;
                }

                setUnit('days', Math.floor(distance / (1000 * 60 * 60 * 24)));
                setUnit('hours', Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
                setUnit('minutes', Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)));
                setUnit('seconds', Math.floor((distance % (1000 * 60)) / 1000));
            }

            // Run immediately to eliminate the 1-second '00' load-in jolt
            updateTimer();
            timer = setInterval(updateTimer, 1000);
        })();
    </script>

</body>

</html>
