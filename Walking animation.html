<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --sky-top: #2980b9; --sky-bottom: #6dd5ed;
            --STABLE-H-BG: #0b1522; --STABLE-H-MID: #0f1d2b; --STABLE-H-FG: #132433;
            --star-opacity: 0; --storm-tint: 0; --particle-opacity: 0;
            --snow-top-opacity: 0;
            --walk-duration: 1.1s;
            --man-face: #e0ac69; --man-cloak: #5d4037; --man-hat: #000; --man-legs: #1a0f08;
            --man-staff: #5d4037; --man-pack: #2b1a10;
            --sun-render: #ffcc00; --sun-glow: #ffcc00;
            --breath-opacity: 0;
            
            /* SKELETAL CONTROLS */
            --man-lean: 0deg; 
            --staff-y: 12px; 
            --staff-x: 28px;
            --staff-rot: -10deg;
        }

        body {
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: #0a0a0c; font-family: 'Courier New', monospace; overflow: hidden;
        }

        #canvas {
            position: relative; width: 800px; height: 450px;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            overflow: hidden; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); margin-bottom: 20px;
        }

        #canvas::after { content: ''; position: absolute; inset: 0; background: rgba(20, 30, 48, var(--storm-tint)); pointer-events: none; z-index: 6; transition: background 2s; }
        
        /* PARTICLES - Forced to absolute top */
        .particles { position: absolute; inset: 0; z-index: 999; opacity: var(--particle-opacity); pointer-events: none; }
        .particle { position: absolute; background: #fff !important; border-radius: 50%; top: 0; left: 0; will-change: transform; }

        .hill { position: absolute; bottom: 0; width: 200%; height: 250px; will-change: transform; background-color: var(--h-perm-col); background-image: linear-gradient(to bottom, rgba(255,255,255, var(--snow-top-opacity)) 0%, rgba(255,255,255, var(--snow-top-opacity)) 45%, transparent 85%); }
        .hill-bg { --h-perm-col: var(--STABLE-H-BG); z-index: 2; }
        .hill-mid { --h-perm-col: var(--STABLE-H-MID); z-index: 3; }
        .hill-fg { --h-perm-col: var(--STABLE-H-FG); z-index: 10; }

        .trekker-group { position: absolute; bottom: 0px; left: 200px; z-index: 20; height: 90px; }
        
        /* Animation Layers */
        .shiver-wrap { display: inline-block; position: absolute; bottom: 0; animation: bob var(--walk-duration) ease-in-out infinite; }
        .shiver-inner { display: inline-block; }
        .shiver-active { animation: shiver 0.1s linear infinite !important; }

        .man { position: relative; width: 45px; height: 90px; }
        .man div { transition: background-color 0.8s, transform 0.4s ease-in-out, top 0.4s, left 0.4s; }

        .body-group { position: absolute; width: 100%; height: 100%; top: 0; left: 0; transform-origin: 21px 68px; transform: rotate(var(--man-lean)); z-index: 5; }
        .legs-group { position: absolute; width: 100%; height: 30px; bottom: 0; left: 0; z-index: 1; }
        .leg { position: absolute; width: 6px; height: 26px; bottom: 0; border-radius: 2px; transform-origin: top; }
        .leg.back { background-color: var(--man-legs); left: 19px; animation: walk-back var(--walk-duration) ease-in-out infinite; filter: brightness(0.6); }
        .leg.front { background-color: var(--man-legs); left: 15px; animation: walk-front var(--walk-duration) ease-in-out infinite; z-index: 3; }

        .torso { position: absolute; width: 10px; height: 42px; top: 26px; left: 16px; background-color: var(--man-cloak); border-radius: 4px; z-index: 2; }
        .pack { position: absolute; width: 8px; height: 16px; background-color: var(--man-pack); top: 32px; left: 10px; border-radius: 1px; z-index: 1; }
        
        .head-group { position: absolute; width: 100%; height: 30px; top: 12px; left: 0; z-index: 8; }
        .head { position: absolute; width: 10px; height: 10px; background-color: var(--man-face); border-radius: 50%; top: 14px; left: 16px; }
        .hat { position: absolute; width: 26px; height: 4px; background-color: var(--man-hat); top: 11px; left: 8px; border-radius: 1px; }
        .hat::before { content: ''; position: absolute; width: 14px; height: 7px; background-color: inherit; top: -7px; left: 6px; border-radius: 3px 3px 0 0; }
        
        .breath { position: absolute; width: 12px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 18px; left: 28px; filter: blur(3px); opacity: var(--breath-opacity); transform: scale(var(--breath-scale, 1)); z-index: 20; }

        .stick { 
            position: absolute; width: 2px; height: 75px; 
            background-color: var(--man-staff); 
            top: var(--staff-y); left: var(--staff-x); 
            border-radius: 1px; 
            transform-origin: 50% 20%; 
            transform: rotate(var(--staff-rot));
            z-index: 99; 
        }

        #sun { position:absolute; width:64px; height:64px; background:var(--sun-render); border-radius:50%; z-index:1; box-shadow:0 0 60px var(--sun-glow); }
        #moon { position:absolute; width:50px; height:50px; background:#e0e6ed; border-radius:50%; z-index:1; box-shadow:0 0 15px #e0e6ed; }

        @keyframes shiver { 0% { transform: translate(0,0); } 25% { transform: translate(1px,1px); } 50% { transform: translate(-1px,-1px); } 75% { transform: translate(1px,-1px); } 100% { transform: translate(0,0); } }
        @keyframes walk-front { 0%, 100% { transform: rotate(-30deg); } 50% { transform: rotate(35deg); } }
        @keyframes walk-back { 0%, 100% { transform: rotate(35deg); } 50% { transform: rotate(-30deg); } }
        @keyframes staff-swing { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(15deg); } }
        @keyframes bob { 0%, 100% { transform: translateY(-3px); } 50% { transform: translateY(0px); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes triumph { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-40px); } }

        #camp-drew {
            position: absolute; z-index: 10;
            width: 140px; height: 120px; background: #6d4c41;
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.5);
            display: none;
        }
        #camp-drew .roof {
            position: absolute; top: -50px; left: -10px;
            width: 0; height: 0;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 50px solid #4e342e;
        }
        #camp-drew::before {
            content: 'CAMP DREW'; position: absolute; top: 20px; width: 100%; text-align: center;
            font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 900; color: #fff;
            text-shadow: 1px 1px 4px #000; z-index: 2;
        }
        #camp-drew::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 40px; height: 60px; background: #3e2723; border-radius: 6px 6px 0 0;
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.8);
        }

        #loading-text { 
            position: absolute; top: 40px; left: 50px; text-align: left; 
            color: #fff; font-family: 'Courier New', monospace; font-size: 1.3rem; line-height: 1.6;
            letter-spacing: 2px; text-transform: uppercase; font-weight: bold; 
            text-shadow: 0 0 15px rgba(0,0,0,0.9), 2px 2px 8px #000; z-index: 1000; pointer-events: none; 
        }

    </style>
</head>
<body>

    <div id="canvas">
        <div id="loading-text"></div>
        <div class="stars"></div>
        <div id="lightning" style="position:absolute; inset:0; background:white; opacity:0; z-index:110; pointer-events:none;"></div>
        <div class="particles" id="pLayer"></div>
        <div id="camp-drew"><div class="roof"></div></div>
        <div id="moon"></div>
        <div id="sun"></div>
        <div class="hill hill-bg" id="hBg"></div>
        <div class="hill hill-mid" id="hMid"></div>
        <div class="trekker-group" id="trekker">
            <div class="shiver-wrap">
                <div id="shiverEl" class="shiver-inner">
                    <div class="man">
                        <div class="legs-group"><div class="leg back"></div><div class="leg front"></div></div>
                        <div class="body-group">
                            <div class="pack"></div>
                            <div class="torso"></div>
                            <div class="head-group">
                                <div class="breath" id="breathCloud"></div>
                                <div class="head"></div>
                                <div class="hat"></div>
                            </div>
                            <div class="stick" id="staffEl"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="hill hill-fg" id="hFg"></div>
    </div>



    <script>
        const root = document.documentElement;
        let worldAngle = Math.PI / 2, walkDist = 0, currentMode = 'shine', snowT = 0, freezeInt;
        let pSpd = 1.0;

        const pal = {
            night: { t: "#040b17", b: "#111c3a", h1: "#06121c", h2: "#091a27", h3: "#0c1e2d" },
            dawn:  { t: "#2a365c", b: "#ff7b54", h1: "#1a363b", h2: "#244a4d", h3: "#2e5c53" },
            day:   { t: "#3a88fe", b: "#a3e5ff", h1: "#1e5631", h2: "#4c9a2a", h3: "#76ba1b" },
            bliz:  { t: "#7f8c8d", b: "#ecf0f1", h1: "#2c3e50", h2: "#34495e", h3: "#5d6d7e" }
        };

        const charPal = {
            norm: { f: "#e0ac69", c: "#5d4037", h: "#000000", l: "#1a0f08", s: "#ffcc00", st: "#5d4037", pk: "#2b1a10" },
            froz: { f: "#a5d6a7", c: "#ffffff", h: "#ffffff", l: "#dddddd", s: "#b3e5fc", st: "#ffffff", pk: "#ffffff" }
        };

        function lerp(a, b, t) {
            const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
            const r = Math.round((ah >> 16) + t * ((bh >> 16) - (ah >> 16)));
            const g = Math.round((ah >> 8 & 255) + t * ((bh >> 8 & 255) - (ah >> 8 & 255)));
            const bl = Math.round((ah & 255) + t * ((bh & 255) - (ah & 255)));
            return `#${(r << 16 | g << 8 | bl).toString(16).padStart(6, '0')}`;
        }

        const pLayer = document.getElementById('pLayer');
        const particles = [];
        for(let i=0; i<180; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.x = Math.random() * 800; p.y = Math.random() * 800 - 400;
            p.speed = 3 + Math.random() * 5; p.gravity = 0.4 + Math.random() * 0.4;
            p.vy = 0; p.bounces = 0; p.groundWait = 0;
            pLayer.appendChild(p); particles.push(p);
        }

        function setWeather(m) {
            currentMode = m;
            root.style.setProperty('--storm-tint', (m === 'rain' || m === 'hail') ? '0.5' : (m === 'snow' ? '0.3' : '0'));
            root.style.setProperty('--particle-opacity', m === 'shine' ? '0' : '1');
            root.style.setProperty('--snow-top-opacity', m === 'snow' ? '1' : '0');
            
            const staff = document.getElementById('staffEl');
            const shiverEl = document.getElementById('shiverEl');
            
            if(m === 'hail' || m === 'snow') shiverEl.classList.add('shiver-active');
            else shiverEl.classList.remove('shiver-active');

            if(m === 'hail') {
                root.style.setProperty('--man-lean', '35deg');
                /* TIGHT STAFF GUARD - 5px ABOVE HEAD */
                root.style.setProperty('--staff-y', '-18px');  
                root.style.setProperty('--staff-x', '42px'); 
                root.style.setProperty('--staff-rot', '85deg');
                staff.style.animation = 'none';
            } else {
                root.style.setProperty('--man-lean', '0deg');
                root.style.setProperty('--staff-y', '12px'); 
                root.style.setProperty('--staff-x', '28px');
                root.style.setProperty('--staff-rot', '-10deg');
                staff.style.animation = 'staff-swing var(--walk-duration) ease-in-out infinite';
            }

            particles.forEach(p => { 
                p.y = Math.random() * 800 - 400; p.vy = 0; p.bounces = 0; p.groundWait = 0; p.style.opacity = 1; 
                // RESTORED PARTICLE STYLES
                if(m === 'rain') { p.style.width = '1px'; p.style.height = '15px'; p.style.borderRadius = '0'; p.style.background = 'rgba(255,255,255,0.4)'; }
                else if(m === 'hail') { p.style.width = '4px'; p.style.height = '4px'; p.style.borderRadius = '50%'; p.style.background = '#fff'; }
                else { p.style.width = '6px'; p.style.height = '6px'; p.style.borderRadius = '50%'; p.style.background = '#fff'; }
            });
            
            clearInterval(freezeInt);
            if (m === 'snow') {
                freezeInt = setInterval(() => {
                    snowT = Math.min(1, snowT + 0.1);
                    updateCharacter(snowT);
                    if(snowT >= 1) clearInterval(freezeInt);
                }, 1000);
            } else { snowT = 0; updateCharacter(0); }
        }

        function updateCharacter(t) {
            root.style.setProperty('--man-face', lerp(charPal.norm.f, charPal.froz.f, t));
            root.style.setProperty('--man-cloak', lerp(charPal.norm.c, charPal.froz.c, t));
            root.style.setProperty('--man-hat', lerp(charPal.norm.h, charPal.froz.h, t));
            root.style.setProperty('--man-legs', lerp(charPal.norm.l, charPal.froz.l, t));
            root.style.setProperty('--sun-render', lerp(charPal.norm.s, charPal.froz.s, t));
            root.style.setProperty('--sun-glow', lerp(charPal.norm.s, charPal.froz.s, t));
            root.style.setProperty('--man-staff', lerp(charPal.norm.st, charPal.froz.st, t));
            root.style.setProperty('--man-pack', lerp(charPal.norm.pk, charPal.froz.pk, t));
        }

        let typeTimer;
        let isArriving = false;
        let campDrewScreenX = 1000;

        function startTypewriter() {
            if(typeTimer) clearInterval(typeTimer);
            isArriving = false;
            document.getElementById('camp-drew').style.display = 'none';
            
            // Dynamic sequence injecting weather and pace changes seamlessly 
            const sequence = [
                { text: "Initializing GPS routing", weather: "shine", pSpd: 1.0 },
                { text: "Proceeding with extreme weather simulation", weather: "shine", pSpd: 1.0 },
                { text: "Tropical downpour", weather: "rain", pSpd: 0.7 },
                { text: "Hail storm", weather: "hail", pSpd: 0.4 },
                { text: "Accounting for freak blizzard", weather: "snow", pSpd: 0.2 },
                { text: "Finalizing route geometry", weather: "shine", pSpd: 1.0 },
                { text: "Simulating nocturnal traversal", weather: "shine", pSpd: 1.2 }, 
                { text: "Calculating topographical fatigue index", weather: "shine", pSpd: 1.0 },
                { text: "", weather: "shine", pSpd: 1.0, setArrive: true },
                { text: "Pilgrimage simulation complete", weather: "shine", pSpd: 1.0 }
            ];
            
            const loadingTextDiv = document.getElementById('loading-text');
            let msgIdx = 0;
            let charIdx = 0;
            let pauseTicks = 0;
            
            typeTimer = setInterval(() => {
                if (msgIdx >= sequence.length) {
                    clearInterval(typeTimer);
                    // Retain the final phrase on screen securely 
                    return;
                }
                
                const step = sequence[msgIdx];
                const currentMsg = step.text + (step.text === "" ? "" : "...");
                
                // Trigger dynamic weather, walking pace, and final arrival the moment a new sequence line begins
                if (charIdx === 0) {
                    if (step.setArrive) {
                        isArriving = true;
                        campDrewScreenX = 642; // Spawn relative to the mathematical terrain
                    }
                    
                    setWeather(step.weather);
                    pSpd = step.pSpd;
                }
                
                if (charIdx <= currentMsg.length) {
                    // Type out only the current string at the top left without retaining previous messages
                    loadingTextDiv.innerHTML = currentMsg.substring(0, charIdx) + '<span style="animation: blink 0.8s step-end infinite;">_</span>';
                    charIdx++;
                    
                    if (charIdx > currentMsg.length && msgIdx === sequence.length - 1) {
                        // The very final calculation letter has successfully painted! Fire voucher webhook to parent window precisely 2.0s later
                        setTimeout(() => {
                            window.parent.postMessage("VOUCHER_READY", "*");
                        }, 2000);
                    }
                } else {
                    pauseTicks++; 
                    if (pauseTicks > 80) { // Extended 80 tick pause (~2.8s resting time) so each weather event lingers longer
                        msgIdx++;
                        charIdx = 0;
                        pauseTicks = 0;
                    }
                }
            }, 35);
        }

        function stopTypewriter() {
            if(typeTimer) clearInterval(typeTimer);
            document.getElementById('loading-text').innerHTML = "";
        }
        
        // Listen for standard postMessage triggers to bypass local file:// cross-origin DOM constraints
        window.addEventListener("message", function(event) {
            if (event.data === "START_QUEST") {
                startTypewriter();
            } else if (event.data === "STOP_QUEST") {
                stopTypewriter();
            } else if (event.data === "RESET_QUEST") {
                setWeather('shine');
                pSpd = 1.0;
                worldAngle = Math.PI / 2;
                isArriving = false;
                document.getElementById('camp-drew').style.display = 'none';
                document.querySelector('.man').style.animation = '';
                document.querySelector('.shiver-wrap').style.animation = '';
                document.querySelector('.leg.back').style.animation = '';
                document.querySelector('.leg.front').style.animation = '';
                document.getElementById('staffEl').style.animation = '';
                stopTypewriter();
            }
        }, false);
        
        // Auto-start for direct standalone viewing 
        startTypewriter();

        const getFgY = (x) => 50 + Math.sin((x / 800) * Math.PI * 2) * 35; // Kept sine curvature but raised entire baseline 20px
        let breathT = 0;

        function animate() {
            // Dynamically speed up time during night and calculate day speed
            const sunSinBefore = Math.sin(worldAngle);
            const wSpd = (sunSinBefore < 0) ? 1.8 : 0.57; // 1.8 condenses the night flawlessly, 0.57 day mathematically crosses sunset smoothly 
            
            worldAngle += 0.0025 * wSpd;
            const sunSin = Math.sin(worldAngle);
            document.getElementById('sun').style.transform = `translate3d(${400 - Math.cos(worldAngle)*450}px, ${320 - sunSin*250}px, 0)`;
            document.getElementById('moon').style.transform = `translate3d(${400 - Math.cos(worldAngle+Math.PI)*450}px, ${320 - Math.sin(worldAngle+Math.PI)*250}px, 0)`;

            const ph = Math.max(0, Math.min(1, (sunSin + 0.6) / 1.2));
            let t, b, h1, h2, h3;
            if (currentMode === 'snow') {
                t = pal.bliz.t; b = pal.bliz.b; h1 = pal.bliz.h1; h2 = pal.bliz.h2; h3 = pal.bliz.h3;
            } else {
                const r = ph < 0.5 ? ph * 2 : (ph - 0.5) * 2;
                const s1 = ph < 0.5 ? pal.night : pal.dawn, s2 = ph < 0.5 ? pal.dawn : pal.day;
                t = lerp(s1.t, s2.t, r); b = lerp(s1.b, s2.b, r);
                h1 = lerp(s1.h1, s2.h1, r); h2 = lerp(s1.h2, s2.h2, r); h3 = lerp(s1.h3, s2.h3, r);
            }

            root.style.setProperty('--sky-top', t); root.style.setProperty('--sky-bottom', b);
            root.style.setProperty('--STABLE-H-BG', h1); root.style.setProperty('--STABLE-H-MID', h2); root.style.setProperty('--STABLE-H-FG', h3);
            root.style.setProperty('--star-opacity', currentMode === 'snow' ? 0 : 1 - ph);

            if (currentMode === 'snow' || currentMode === 'hail') {
                breathT += 0.02; const bC = Math.sin(breathT);
                root.style.setProperty('--breath-opacity', Math.max(0, bC * 0.5));
                root.style.setProperty('--breath-scale', 1 + (Math.max(0, bC) * 1.5));
            } else root.style.setProperty('--breath-opacity', 0);

            walkDist += 1.8 * pSpd;
            const hFgX = walkDist % 800;

            if(currentMode !== 'shine') {
                particles.forEach(p => {
                    if (currentMode === 'hail') {
                        p.x -= 1.8 * pSpd; if (p.x < 0) p.x = 800;
                        
                        let hitG = 450 - getFgY(p.x + hFgX) - 4; // Genuine terrain elevation tracker
                        let onStick = false;
                        
                        // The staff acts as an umbrella! If particle is within horizontal coordinates, elevate the mathematical bounce floor!
                        const sY = 450 - getFgY(222 + hFgX) - 86;
                        if (p.x > 180 && p.x < 260 && p.y <= sY + 15) {
                            hitG = sY;
                            onStick = true;
                        }

                        if (p.groundWait > 0) {
                            p.groundWait--; p.style.opacity = p.groundWait / 60;
                            p.y = hitG; // Glue grounded melting hail to the rolling hills mathematically so it never visually hovers while fading out!
                            if (p.groundWait <= 0) { p.y = -100 - (Math.random() * 500); p.vy = 0; p.bounces = 0; p.style.opacity = 1; }
                        } else {
                            p.y += p.speed + p.vy; p.vy += p.gravity;
                            if (p.y >= hitG) {
                                p.y = hitG; 
                                p.vy = -p.vy * 0.45; // Dynamic bounce decay
                                p.bounces++;
                                
                                // Only let the hail pool/melt if it hits the grass! If bounded on the stick umbrella, keep it bouncing organically until it safely slips off!
                                if (p.bounces > 2 && !onStick) { 
                                    if (Math.random() > 0.25) { p.y = -100 - (Math.random() * 800); p.vy = 0; p.bounces = 0; } 
                                    else p.groundWait = 30 + Math.random() * 60; 
                                }
                            }
                        }
                    } else {
                        p.y += (currentMode === 'snow' ? p.speed * 0.4 : p.speed);
                        if(p.y > 450) p.y = -50 - (Math.random() * 400);
                    }
                    p.style.transform = `translate3d(${p.x}px, ${p.y}px, 0)`;
                });
            }

            function build(fn) {
                let pts = ['0% 100%'];
                for(let x=0; x<=1600; x+=10) pts.push(`${(x/1600)*100}% ${100-(fn(x)/250)*100}%`);
                pts.push('100% 100%'); return `polygon(${pts.join(',')})`;
            }
            document.getElementById('hBg').style.clipPath = build(x => 130 + Math.sin((x/266)*Math.PI*2)*45);
            document.getElementById('hMid').style.clipPath = build(x => 80 + Math.sin((x/400)*Math.PI*2)*40);
            document.getElementById('hFg').style.clipPath = build(getFgY);
            document.getElementById('hBg').style.transform = `translate3d(${(walkDist*0.25)%800*-1}px,0,0)`;
            document.getElementById('hMid').style.transform = `translate3d(${(walkDist*0.5)%800*-1}px,0,0)`;
            document.getElementById('hFg').style.transform = `translate3d(${-hFgX}px,0,0)`;
            
            // Adjusted tracking math logic by +5px (downwards onto Y axis offset) so that his feet confidently intersect against the hill polygon
            document.getElementById('trekker').style.transform = `translate3d(0, ${-getFgY(222 + hFgX) + 5}px, 0)`;
            
            if (isArriving) {
                // Ground mathematically binds the building object to the scrolling speed of the undulating background geometry exactly
                campDrewScreenX -= 1.8 * pSpd; 

                // Automatic perfectly-timed halt when the rigid building boundary technically physically intersects the physical tracker group
                if (campDrewScreenX <= 210 && pSpd > 0) {
                    campDrewScreenX = 210; 
                    pSpd = 0; // Mathematical engine halts all physics universally
                    document.querySelector('.man').style.animation = 'triumph 0.8s ease-in-out infinite';
                    document.querySelector('.shiver-wrap').style.animation = 'none';
                    document.querySelector('.leg.back').style.animation = 'none';
                    document.querySelector('.leg.front').style.animation = 'none';
                    document.getElementById('staffEl').style.animation = 'none';
                }

                document.getElementById('camp-drew').style.display = 'block';
                document.getElementById('camp-drew').style.left = campDrewScreenX + 'px';
                
                // Track Y coordinate to flawlessly glide and track smoothly onto the undulating sine-wave math equation frame by frame
                const cdY = getFgY(campDrewScreenX + 70 + hFgX);
                document.getElementById('camp-drew').style.bottom = (cdY - 10) + 'px'; 
            }
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
